<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Digital Siswa Informatika</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/username/repo/style.css">
</head>
<body>

    <div id="loader" class="container mt-5">
        <div class="skeleton-card"></div>
    </div>

    <div id="app" class="container py-4" style="display:none;">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="fw-bold text-primary">Absensi Digital</h4>
                <p class="text-muted small">SMA AL ISLAM 1 SURAKARTA</p>
            </div>
            <button class="btn btn-outline-primary" onclick="showModal('menuModal')">
                <i class="fas fa-bars"></i>
            </button>
        </header>

        <div id="content-area">
            </div>
    </div>

    <div class="modal fade" id="menuModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-body p-4">
                    <h5 class="mb-3">Menu Aplikasi</h5>
                    <div class="d-grid gap-2">
                        <button class="btn btn-light text-start" onclick="loadView('input')"><i class="fas fa-edit me-2"></i> Input Presensi</button>
                        <button class="btn btn-light text-start" onclick="loadView('rekap')"><i class="fas fa-chart-pie me-2"></i> Rekap Kehadiran</button>
                        <button class="btn btn-light text-start" onclick="loadView('riwayat')"><i class="fas fa-history me-2"></i> Riwayat Absensi</button>
                        <button class="btn btn-light text-start" onclick="loadView('seluruh')"><i class="fas fa-users me-2"></i> Rekap Seluruh Siswa</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/username/repo/script.js"></script>
</body>
</html>
